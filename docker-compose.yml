version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/app.dockerfile
    image: apresentar-app:latest
    container_name: apresentar_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
    volumes:
      - app-data:/var/www/html
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - apresentar-network

  web:
    image: nginx:stable-alpine
    container_name: apresentar_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - app-data:/var/www/html:ro
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - apresentar-network

volumes:
  app-data:

networks:
  apresentar-network:
    driver: bridge
